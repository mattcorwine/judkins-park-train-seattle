<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Judkins Park Train</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111 url('bg.png') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: stretch;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    .card {
      font-size: 1.4rem;
      color: #e0e0e0;
      text-align: center;
      background: rgba(0, 0, 0, 0.55);
      padding: 12px 20px;
      backdrop-filter: blur(6px);
    }

    .card p {
      margin: 0;
    }

    @media (max-width: 768px) {
      body {
        background-size: auto 75vh;
        background-position: center top;
      }

      #bottom {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
      }
    }

    .green {
      color: #4cd964;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="top" class="card">Loading…</div>
  <div id="bottom" class="card"></div>

  <script>
    const WALK_TO_STATION    = 7;       // minutes
    const SEATAC_OFFSET_MS   = 1980000; // 33 min: Int'l Dist → SeaTac on 1 Line
    const ONE_LINE_ROUTE_ID  = '40_100479';
    const API_KEY = 'TEST';
    const BASE = 'https://api.pugetsound.onebusaway.org/api/where';

    // Fixed travel-time offsets from Judkins Park, computed once from the timetable.
    let offsets = null;

    // ── API helpers ──────────────────────────────────────────────────────────

    async function fetchArrivals(stopId) {
      const res = await fetch(
        `${BASE}/arrivals-and-departures-for-stop/${stopId}.json` +
        `?key=${API_KEY}&minutesBefore=0&minutesAfter=90`
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      return data?.data?.entry?.arrivalsAndDepartures ?? [];
    }

    const tripCache = {};
    async function fetchTripEntry(tripId) {
      if (!tripId) return null;
      if (tripCache[tripId]) return tripCache[tripId];
      const res = await fetch(`${BASE}/trip-details/${tripId}.json?key=${API_KEY}`);
      if (!res.ok) return null;
      const entry = (await res.json())?.data?.entry ?? null;
      if (entry) tripCache[tripId] = entry;
      return entry;
    }

    // ── Timetable (one-time init) ────────────────────────────────────────────

    function scheduleOffsetMs(stopTimes, fromId, toId) {
      const from = stopTimes.find(s => s.stopId === fromId);
      const to   = stopTimes.find(s => s.stopId === toId);
      return (from && to) ? (to.arrivalTime - from.arrivalTime) * 1000 : null;
    }

    async function loadOffsets(westArrivals, eastArrivals) {
      const [westEntry, eastEntry] = await Promise.all([
        fetchTripEntry(westArrivals[0]?.tripId),
        fetchTripEntry(eastArrivals[0]?.tripId),
      ]);

      const wSt = westEntry?.schedule?.stopTimes ?? [];
      const eSt = eastEntry?.schedule?.stopTimes ?? [];

      offsets = {
        // Westbound 2 Line from Judkins Park
        intlDist:    scheduleOffsetMs(wSt, '40_E01-T1', '40_621'),
        capitolHill: scheduleOffsetMs(wSt, '40_E01-T1', '40_99603')
                  ?? scheduleOffsetMs(wSt, '40_E01-T1', '40_99610'),
        // Eastbound 2 Line from Judkins Park
        eastMain:    scheduleOffsetMs(eSt, '40_E01-T2', '40_E11-T2'),
      };
    }

    // ── Real-time logic ──────────────────────────────────────────────────────

    function predictedMs(a) {
      return a.predicted && a.predictedArrivalTime > 0
        ? a.predictedArrivalTime
        : a.scheduledArrivalTime;
    }

    function nextCatchable(arrivals) {
      const now = Date.now();
      return arrivals
        .filter(a => predictedMs(a) > 0)
        .sort((a, b) => predictedMs(a) - predictedMs(b))
        .find(a => (predictedMs(a) - now) / 60000 >= WALK_TO_STATION)
        ?? null;
    }

    // Given the time you'd arrive at Int'l District, find the next 1 Line
    // southbound departure and return its SeaTac arrival time.
    function seaTacArrival(intlDistArrivals, intlDistArrivalMs) {
      const next = intlDistArrivals
        .filter(a => a.routeId === ONE_LINE_ROUTE_ID && predictedMs(a) >= intlDistArrivalMs)
        .sort((a, b) => predictedMs(a) - predictedMs(b))[0];
      return next ? predictedMs(next) + SEATAC_OFFSET_MS : null;
    }

    // ── Rendering ────────────────────────────────────────────────────────────

    function fmtWait(mins) {
      if (mins === null) return 'no trains found';
      if (mins === 0) return '<span class="green">no wait</span>';
      return `<span class="green">${mins} minute${mins === 1 ? '' : 's'}</span>`;
    }

    function fmtTime(ms) {
      return `<span class="green">${new Date(ms).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })}</span>`;
    }

    function render(westArrivals, eastArrivals, intlDistArrivals) {
      const now       = Date.now();
      const westNext  = nextCatchable(westArrivals);
      const eastNext  = nextCatchable(eastArrivals);

      const seattleWait = westNext
        ? Math.round((predictedMs(westNext) - now) / 60000 - WALK_TO_STATION) : null;
      const redmondWait = eastNext
        ? Math.round((predictedMs(eastNext) - now) / 60000 - WALK_TO_STATION) : null;

      document.getElementById('top').innerHTML =
        `<p>If Coburn leaves now, he would wait ${fmtWait(seattleWait)} for the Seattle train and ${fmtWait(redmondWait)} for the Redmond train.</p>`;

      const wMs = westNext ? predictedMs(westNext) : null;
      const eMs = eastNext ? predictedMs(eastNext) : null;

      const stops = [];

      if (wMs && offsets?.intlDist != null) {
        const intlMs = wMs + offsets.intlDist;
        stops.push({ label: 'International District', ms: intlMs });

        const seaTacMs = seaTacArrival(intlDistArrivals, intlMs);
        if (seaTacMs) stops.push({ label: 'SeaTac Airport', ms: seaTacMs });
      }

      if (wMs && offsets?.capitolHill != null)
        stops.push({ label: 'Capitol Hill', ms: wMs + offsets.capitolHill });

      if (eMs && offsets?.eastMain != null)
        stops.push({ label: 'East Main', ms: eMs + offsets.eastMain });

      if (stops.length) {
        stops.sort((a, b) => a.ms - b.ms);
        const parts = stops.map(s => `${s.label} at ${fmtTime(s.ms)}`);
        const last = parts.pop();
        const sentence = parts.length
          ? `He would get to ${parts.join(', ')}, and ${last}.`
          : `He would get to ${last}.`;
        document.getElementById('bottom').innerHTML = `<p>${sentence}</p>`;
      }
    }

    // ── Startup & refresh loop ───────────────────────────────────────────────

    async function refresh() {
      const [westArrivals, eastArrivals, intlDistArrivals] = await Promise.all([
        fetchArrivals('40_E01-T1'),
        fetchArrivals('40_E01-T2'),
        fetchArrivals('40_623'),
      ]);
      render(westArrivals, eastArrivals, intlDistArrivals);
    }

    async function init() {
      try {
        const [westArrivals, eastArrivals, intlDistArrivals] = await Promise.all([
          fetchArrivals('40_E01-T1'),
          fetchArrivals('40_E01-T2'),
          fetchArrivals('40_623'),
        ]);
        await loadOffsets(westArrivals, eastArrivals);
        render(westArrivals, eastArrivals, intlDistArrivals);
        setInterval(refresh, 60000);
      } catch (err) {
        document.getElementById('top').textContent = `Error: ${err.message}`;
      }
    }

    init();
  </script>
</body>
</html>
